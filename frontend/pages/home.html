<!-- DASHBOARD CARDS -->
<div class="dashboard">

  <div class="playcard">
    <h3>🗳️ Today's Vote</h3>
    <p>Vote for today's winner</p>
    <button onclick="vote()">Vote Now</button>
  </div>

  <div class="playcard">
    <h3>🏆 Leaderboards</h3>
    <p>See top players</p>
    <button onclick="leaderboard()">View</button>
  </div>

  <div class="playcard clickable" onclick="goToAchievements()">
    <h3>🎖️ Achievements</h3>
    <p>View your progress</p>
  </div>

  <div class="playcard">
    <h3>💙 Fav Team</h3>
    <p id="favTeam">Not Selected</p>
    <button onclick="setFavTeam()">Set Team</button>
  </div>

</div>
